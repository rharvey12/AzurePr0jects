name: Security Scan + Compliance Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Checkov Action
        uses: bridgecrewio/checkov-action@master
        with:
          directory: Project7-Terraform
          framework: terraform
          output_format: cli
          external_checks_dirs: custom_checkov_rules
          soft_fail: false

  terraform-validate:
    name: Validate All Terraform
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        project: [Project5-Terraform-IaC, Project7-Terraform, Project9-Terraform]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init (No Backend)
        run: terraform init -backend=false
        working-directory: ${{ matrix.project }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.project }}
