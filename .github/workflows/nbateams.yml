name: NBA Infrastructure Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  terraform:
    name: Deploy NBA Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        run: terraform init
        working-directory: Project7-Terraform
      - name: Terraform Plan
        run: terraform plan
        working-directory: Project7-Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: Project7-Terraform
